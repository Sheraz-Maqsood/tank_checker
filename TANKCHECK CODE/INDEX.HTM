<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Tank Level Monitor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f0f4f7;
      margin: 0;
      padding: 0;
    }

    .container {
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .tank-container {
      position: relative;
      margin: 20px auto;
      width: 150px;
      height: 400px;
      background: #f0f0f0;
      border-radius: 10px;
      border: 4px solid #999;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column-reverse;
    }

    .water-level {
      height: 20px;
      width: 100%;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      box-sizing: border-box;
      transition: background-color 0.3s;
    }

    .level-text {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.5em;
      font-weight: bold;
      color: #333;
      background: rgba(255, 255, 255, 0.7);
      padding: 5px 10px;
      border-radius: 5px;
    }

    .logs {
      margin-top: 20px;
      padding: 10px;
      background-color: #f9f9f9;
      border-radius: 8px;
      border: 2px solid #ddd;
    }

    .pin-info {
      margin-top: 20px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .pin-item {
      padding: 5px 10px;
      background: #eee;
      border-radius: 5px;
      font-size: 0.9em;
    }

    .pin-item.active {
      background: #4CAF50;
      color: white;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Water Tank Level Monitor</h1>

    <div class="tank-container" id="tankContainer">
      <div class="level-text" id="tankPercentage">0%</div>
      <!-- Water levels will be added dynamically -->
    </div>

    <div class="pin-info" id="pinInfo"></div>

    <div class="logs">
      <p class="log-p" id="logP">Waiting for data...</p>
    </div>
  </div>

  <script>
    const tankContainer = document.getElementById('tankContainer');
    const tankPercentage = document.getElementById('tankPercentage');
    const logElement = document.getElementById('logP');
    const pinInfoElement = document.getElementById('pinInfo');

    // GPIO pins being monitored (in order from bottom to top of tank)
    const pinNumbers = [0, 2, 4, 5, 12, 13, 14, 15, 16, 17, 18, 19, 21, 22, 23, 25, 26, 27, 32, 33];
    const totalLevels = pinNumbers.length;

    // Create water level indicators
    function createWaterLevels() {
      tankContainer.innerHTML = '';
      tankContainer.appendChild(tankPercentage);

      // Create levels from bottom (Pin 0) to top (Pin 33)
      for (let i = 0; i < totalLevels; i++) {
        const level = document.createElement('div');
        level.className = 'water-level';
        level.id = `level-${i}`;
        level.style.backgroundColor = 'transparent';
        tankContainer.appendChild(level);
      }
    }

    // Update tank visualization
    function updateTankLevels(pinStates) {
      const states = pinStates.split(',');
      let activeCount = 0;
      let highestActiveIndex = -1;

      // Process from bottom (Pin 0) to top (Pin 33)
      for (let i = 0; i < totalLevels; i++) {
        const level = document.getElementById(`level-${i}`);
        const state = states[i];

        if (state === '0') { // 0 means water is present (circuit complete)
          // Calculate color from RED (bottom) to BLUE (top)
          const hue = 0 + (i * (240 / totalLevels));
          level.style.backgroundColor = `hsl(${hue}, 100%, 50%)`;
          activeCount++;
          highestActiveIndex = i;
        } else {
          level.style.backgroundColor = 'transparent';
        }
      }

      // Calculate percentage based on the highest active level
      const highestLevelCount = highestActiveIndex + 1;
      const percentage = Math.round((highestLevelCount / totalLevels) * 100);
      tankPercentage.textContent = `${percentage}%`;

      // Update pin info (now in correct order from bottom to top)
      updatePinInfo(states);

      logMessage(`Water levels updated. Active sensors: ${activeCount}. Highest active: ${highestLevelCount}/${totalLevels} (${percentage}%)`);
    }

    // Update pin information display (now showing correct order)
    function updatePinInfo(states) {
      pinInfoElement.innerHTML = '';

      states.forEach((state, index) => {
        const pinItem = document.createElement('div');
        pinItem.className = `pin-item ${state === '0' ? 'active' : ''}`;
        pinItem.textContent = `Level ${index + 1}: Pin ${pinNumbers[index]} (${state === '0' ? 'Wet' : 'Dry'})`;
        pinInfoElement.appendChild(pinItem);
      });
    }

    function logMessage(message) {
      console.log(message);
      logElement.textContent = message;
    }

    // Initialize tank visualization
    createWaterLevels();

    // Fetch pin states from Arduino and update UI
    setInterval(() => {
      fetch('http://192.168.10.222/tank-level')
        .then(response => response.json())
        .then(data => {
          const pinStates = data.tank_level; // Get the comma-separated string
          updateTankLevels(pinStates);
        })
        .catch(error => {
          console.error('Error fetching pin states:', error);
          logMessage('Error fetching pin states. Check connection.');
        });
    }, 1000);
  </script>
</body>

</html>
